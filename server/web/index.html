<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeHub - 边缘设备管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <h1>
          <span class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </span>
          EdgeHub
        </h1>
        <p>边缘设备管理系统</p>
      </div>
      
      <nav class="nav-menu">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          总览
        </a>
        <a href="#devices" class="nav-item" data-page="devices">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          设备列表
        </a>
        <a href="#projects" class="nav-item" data-page="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          项目
        </a>
        <a href="#logs" class="nav-item" data-page="logs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          开发记录
        </a>
        <a href="#agents" class="nav-item" data-page="agents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          智能体一览
        </a>
        <a href="#commands" class="nav-item" data-page="commands">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          命令
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <p>v2.0.0 · WireGuard VPN</p>
      </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="top-bar">
        <h2 id="page-title">系统概览</h2>
        <div class="top-bar-actions">
          <button class="btn btn-primary" onclick="showCreateProjectModal()">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新建项目
          </button>
        </div>
      </header>
      
      <!-- 内容区域 -->
      <div class="content-area" id="content-area">
        <!-- 概览页面 -->
        <div id="page-dashboard" class="page active">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-devices">-</div>
                <div class="stat-label">设备总数</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon green">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-projects">-</div>
                <div class="stat-label">项目总数</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon yellow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-logs">-</div>
                <div class="stat-label">开发记录</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon purple">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-active-projects">-</div>
                <div class="stat-label">活跃项目</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-agents">-</div>
                <div class="stat-label">智能体</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon red">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-issues">-</div>
                <div class="stat-label">待解决问题</div>
              </div>
            </div>
          </div>
          
          <div class="dashboard-grid">
            <div class="card">
              <h3>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                活跃项目
              </h3>
              <div id="active-projects-list" class="list-container">
                <p class="loading">加载中...</p>
              </div>
            </div>
            <div class="card">
              <h3>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                最近开发记录
              </h3>
              <div id="recent-logs-list" class="list-container">
                <p class="loading">加载中...</p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 设备列表页面 -->
        <div id="page-devices" class="page">
          <div class="device-list" id="device-list">
            <p class="loading">加载中...</p>
          </div>
        </div>
        
        <!-- 项目页面 -->
        <div id="page-projects" class="page">
          <div class="projects-grid" id="projects-list">
            <p class="loading">加载中...</p>
          </div>
        </div>
        
        <!-- 开发记录页面 -->
        <div id="page-logs" class="page">
          <div class="logs-container" id="logs-container">
            <p class="loading">加载中...</p>
          </div>
        </div>
        
        <!-- 设备详情页面 -->
        <div id="page-device-detail" class="page">
          <button class="btn btn-secondary" onclick="navigateTo('devices')">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            返回设备列表
          </button>
          <div id="device-detail-content"></div>
        </div>
        
        <!-- 项目详情页面 -->
        <div id="page-project-detail" class="page">
          <button class="btn btn-secondary" onclick="navigateTo('projects')">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            返回项目列表
          </button>
          <div id="project-detail-content"></div>
        </div>

        <div id="page-agents" class="page">
          <div id="agents-list">
            <p class="loading">加载中...</p>
          </div>
        </div>

        <div id="page-agent-detail" class="page">
          <button class="btn btn-secondary" onclick="navigateTo('agents')">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            返回智能体列表
          </button>
          <div id="agent-detail-content"></div>
        </div>

        <div id="page-commands" class="page">
          <div id="commands-container" class="table-container">
            <p class="loading">加载中...</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 创建项目弹窗 -->
  <div id="create-project-modal" class="modal">
    <div class="modal-content">
      <h3>创建新项目</h3>
      <form id="create-project-form">
        <div class="form-group">
          <label>选择设备</label>
          <select id="project-device" required>
            <option value="">请选择设备</option>
          </select>
        </div>
        <div class="form-group">
          <label>项目名称</label>
          <input type="text" id="project-name" required placeholder="例如: SLSD视觉系统">
        </div>
        <div class="form-group">
          <label>项目路径</label>
          <input type="text" id="project-path" required placeholder="例如: /home/ubuntu/slsd-vision">
        </div>
        <div class="form-group">
          <label>描述（可选）</label>
          <textarea id="project-description" placeholder="项目描述"></textarea>
        </div>
        <div class="form-group">
          <label>优先级 (1-10, 1最高)</label>
          <input type="number" id="project-priority" min="1" max="10" value="5">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
