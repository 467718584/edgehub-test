# EdgeHub Docker Compose - 完整部署方案
# Usage: docker-compose up -d

version: '3.8'

services:
  # ==================== EdgeHub API 服务器 ====================
  edgehub-api:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    container_name: edgehub-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据库
      - edgehub-data:/app/data
      # 配置文件（可选，挂载后覆盖镜像内配置）
      # - ./config:/app/src/config:ro
    environment:
      - NODE_ENV=production
      - PORT=8080
    networks:
      - edgehub-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/v1/stats', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: edgehub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../../server/web:/usr/share/nginx/html:ro
    depends_on:
      edgehub-api:
        condition: service_healthy
    networks:
      - edgehub-network



networks:
  edgehub-network:
    driver: bridge

volumes:
  edgehub-data:
    driver: local
